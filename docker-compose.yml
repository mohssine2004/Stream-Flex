services:
  db:
    image: postgres:15-alpine
    container_name: stream-flex-db
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: sousou2004
      POSTGRES_DB: streaming_db
    ports:
      - "5434:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5

  minio:
    image: minio/minio
    container_name: stream-flex-minio
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    ports:
      - "9000:9000"
      - "9001:9001"
    command: server /data --console-address ":9001"
    volumes:
      - minio_data:/data

  backend:
    build: 
      context: ./backend
      dockerfile: Dockerfile
    container_name: stream-flex-backend
    ports:
      - "5001:5000"
    env_file:
      - ./backend/.env.docker
    depends_on:
      db:
        condition: service_healthy
      minio:
        condition: service_started

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: stream-flex-frontend
    ports:
      - "80:80"
    depends_on:
      - backend

volumes:
  postgres_data:
  minio_data:
