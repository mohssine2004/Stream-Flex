services:
  db:
    image: postgres:15-alpine
    container_name: stream-flex-db
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: sousou2004
      POSTGRES_DB: streaming_db
    ports:
      - "5434:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  minio:
    image: minio/minio
    container_name: stream-flex-minio
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    ports:
      - "9000:9000"
      - "9001:9001"
    command: server /data --console-address ":9001"
    volumes:
      - minio_data:/data

volumes:
  postgres_data:
  minio_data:
